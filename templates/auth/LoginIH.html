<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/login.css', v='3.0') }}" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>

    <main class="main">
      <form class="card" action="{{ url_for('auth.iniciar_sesion') }}" method="POST">
        <div class="card-header">
          <h2>Iniciar sesión</h2>
          <p>Ingresa tus credenciales para continuar</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-container">
              {% for category, message in messages %}
                <div class="flash-message {{ category }}"
                    style="background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 12px; margin-bottom: 20px; border-radius: 10px; text-align: center; font-weight: bold; display: block;">
                  {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <div class="field">
          <label for="username">Nombre de usuario</label>
          <input type="text" id="username" name="username" placeholder="usuario_ejemplo" required />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>

        <button class="btn" type="submit">Enviar</button>
      </form>
    </main>
  </div>
</body>
</html>
