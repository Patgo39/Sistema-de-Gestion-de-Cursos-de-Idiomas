<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ curso.nombre_curso }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/docente/curso_informacion.css') }}">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2></h2>
            <hr>
            <a href="{{ url_for('docente.crear_curso_vista') }}">Crear Nuevo Curso</a>
            <a href="#">Mis Alumnos</a>
            <a href="{{ url_for('docente.perfil_docente') }}">Mi Perfil</a>
            <a href="{{ url_for('auth.cerrar_sesion') }}" style="margin-top: auto; color: #ff6b6b;">Cerrar Sesión</a>
        </aside>
        <div class="main">
            <div class="card-header">
                <h2>{{ curso.nombre_curso }} — Curso #{{ curso.id_curso }}</h2>
            </div>
            <ol class="alumno-lista">
                {% for alumno in lista_inscripcion %}
                    <li>
                        <a href="{{ url_for('docente.datos_alumno', id_curso=curso.id_curso, id_usuario=alumno.id_usuario) }}">
                            {{ alumno.nombre_completo }}
                        </a>
                    </li>
                {% endfor %}
            </ol>
        </div>
    </div>
</body>
</html>
